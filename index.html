<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBGS Team Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #021D41;
    font-family: 'Barlow', 'Arial', sans-serif;
    color: white;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(to right, #9728D1, #F93A5A, #FFBD17);
    padding: 22px 28px 18px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(-45deg, transparent, transparent 9px, rgba(0,0,0,0.09) 9px, rgba(0,0,0,0.09) 18px);
    pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; }
  .brand-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: white;
    text-shadow: 3px 3px 0 #021D41, 1px 1px 0 rgba(0,0,0,0.5);
    line-height: 1;
  }
  .brand-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #021D41;
    margin-top: 5px;
  }
  .gradient-rule { height: 3px; background: linear-gradient(to right, #2424E9, #9728D1, #F93A5A, #FFBD17); }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #0F2851;
    border-bottom: 1px solid #24386D;
    flex-wrap: wrap;
    gap: 8px;
  }
  .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sync-status {
    font-size: 0.72rem;
    color: #A7B5D6;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #75E099; flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.saving { background: #FFBD17; }
  .sync-dot.error  { background: #F93A5A; }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-add { background: linear-gradient(to right, #9728D1, #F93A5A); color: white; display: flex; align-items: center; gap: 6px; font-size: 0.78rem; }

  .filter-tabs { display: flex; gap: 4px; }
  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid #24386D;
    background: transparent;
    color: #A7B5D6;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active { background: linear-gradient(to right, #9728D1, #F93A5A); color: white; border-color: transparent; }

  /* ── STATS BAR ── */
  .stats-bar { display: flex; gap: 10px; padding: 14px 20px; background: #0F2851; border-bottom: 2px solid #24386D; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 90px; background: #24386D; border-radius: 8px; padding: 10px 12px; text-align: center; }
  .stat-card.highlight { background: linear-gradient(135deg, #1a3360, #24386D); border: 1px solid #4A82FF33; }
  .stat-number { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; color: #FFBD17; line-height: 1; }
  .stat-card.highlight .stat-number { color: #75E099; }
  .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #A7B5D6; margin-top: 3px; line-height: 1.2; }
  .stat-pct { font-size: 0.7rem; color: #A7B5D6; margin-top: 2px; }
  .mini-bar-bg { height: 4px; background: #021D41; border-radius: 2px; margin-top: 7px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(to right, #9728D1, #F93A5A, #FFBD17); transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .stat-card.highlight .mini-bar-fill { background: #75E099; }

  /* ── TABLE ── */
  .table-wrap { padding: 0 20px 28px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 560px; margin-top: 16px; }
  thead tr { background: linear-gradient(to right, #9728D1 0%, #F93A5A 55%, #FFBD17 100%); }
  thead th { padding: 10px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: white; text-align: left; white-space: nowrap; }
  thead th.center { text-align: center; }

  tbody tr { border-bottom: 1px solid #24386D; transition: background 0.15s; }
  tbody tr:nth-child(even) { background: rgba(36,56,109,0.28); }
  tbody tr:hover { background: #0F2851; }
  tbody tr.hidden-row { display: none; }

  td { padding: 9px 14px; font-size: 0.84rem; vertical-align: middle; }
  .task-cell { display: flex; align-items: center; gap: 8px; }
  .star { color: #FFBD17; font-size: 0.72rem; flex-shrink: 0; }
  .task-name { color: white; font-weight: 500; }
  .task-name.all-done { text-decoration: line-through; opacity: 0.55; }
  .who-text { font-size: 0.76rem; color: #A7B5D6; font-style: italic; }

  /* ── OWNER EDIT BUTTON ── */
  .owner-cell { display: flex; align-items: center; gap: 6px; }
  .edit-owner-btn {
    background: none; border: none; cursor: pointer; color: #4A5A7A;
    font-size: 0.75rem; padding: 2px 4px; border-radius: 3px; line-height: 1;
    transition: color 0.15s, background 0.15s; flex-shrink: 0; opacity: 0;
  }
  tr:hover .edit-owner-btn { opacity: 1; }
  .edit-owner-btn:hover { color: #FFBD17; background: rgba(255,189,23,0.1); }

  /* ── CHECKBOXES ── */
  .check-cell { text-align: center; }
  .check-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px; font-size: 1rem; font-weight: 700;
    cursor: pointer; border: none; transition: transform 0.12s, box-shadow 0.12s;
    outline: none; -webkit-appearance: none;
  }
  .check-btn:hover { transform: scale(1.15); }
  .check-btn:active { transform: scale(0.95); }
  .check-btn.done { background: rgba(51,188,86,0.22); color: #75E099; border: 1.5px solid rgba(51,188,86,0.5); box-shadow: 0 0 8px rgba(117,224,153,0.2); }
  .check-btn.pending { background: rgba(167,181,214,0.07); border: 1.5px solid #24386D; color: transparent; }
  .check-btn.pending:hover { border-color: #75E099; background: rgba(117,224,153,0.08); }

  /* ── SORTABLE COLUMN HEADER ── */
  .sort-th { cursor: pointer; user-select: none; }
  .sort-th:hover { background: rgba(255,255,255,0.08); }
  .sort-inner { display: inline-flex; align-items: center; gap: 5px; }
  .sort-icon { font-size: 0.65rem; opacity: 0.5; transition: opacity 0.15s; }
  .sort-th.asc  .sort-icon,
  .sort-th.desc .sort-icon { opacity: 1; color: #FFBD17; }

  /* ── DIALOGS ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(2,29,65,0.85); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .dialog {
    background: #0F2851; border: 1px solid #24386D; border-radius: 12px;
    padding: 28px 28px 22px; max-width: 340px; width: 90%; text-align: center;
  }
  .add-dialog { max-width: 400px; text-align: left; }
  .add-dialog h3, .add-dialog p { text-align: center; }
  .dialog h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .dialog p { font-size: 0.82rem; color: #A7B5D6; line-height: 1.5; margin-bottom: 20px; }
  .dialog-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-confirm { background: linear-gradient(to right, #9728D1, #F93A5A); color: white; }
  .btn-cancel { background: #24386D; color: #A7B5D6; border: 1px solid #4A82FF33; }

  /* ── FORM FIELDS ── */
  .field-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #A7B5D6; }
  .field-input { background: #021D41; border: 1.5px solid #24386D; border-radius: 6px; color: white; font-family: 'Barlow', sans-serif; font-size: 0.88rem; padding: 9px 12px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field-input::placeholder { color: #4A5A7A; }
  .field-input:focus { border-color: #9728D1; }
  .field-error { font-size: 0.72rem; color: #F93A5A; min-height: 16px; margin-top: 2px; }

  /* ── MULTI-SELECT DROPDOWN ── */
  .ms-wrap { position: relative; }
  .ms-trigger {
    background: #021D41; border: 1.5px solid #24386D; border-radius: 6px; color: white;
    font-family: 'Barlow', sans-serif; font-size: 0.88rem; padding: 8px 32px 8px 10px;
    outline: none; width: 100%; cursor: pointer; text-align: left; transition: border-color 0.15s;
    min-height: 40px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; position: relative;
  }
  .ms-trigger.open, .ms-trigger:focus { border-color: #9728D1; }
  .ms-trigger::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #A7B5D6; font-size: 0.8rem; pointer-events: none; }
  .ms-placeholder { color: #4A5A7A; font-style: italic; }
  .ms-tag { background: linear-gradient(to right, #9728D133, #F93A5A33); border: 1px solid #9728D166; border-radius: 4px; color: #CAE2FF; font-size: 0.74rem; font-weight: 600; padding: 2px 7px; white-space: nowrap; }
  .ms-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #0F2851; border: 1.5px solid #9728D1; border-radius: 8px; z-index: 200; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .ms-panel.open { display: block; }
  .ms-option { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background 0.12s; font-size: 0.86rem; border-bottom: 1px solid #24386D22; }
  .ms-option:last-child { border-bottom: none; }
  .ms-option:hover { background: #24386D; }
  .ms-option.selected { background: rgba(151,40,209,0.15); }
  .ms-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #24386D; background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; transition: all 0.12s; }
  .ms-option.selected .ms-check { background: linear-gradient(135deg, #9728D1, #F93A5A); border-color: transparent; color: white; }

  /* ── LOADING ── */
  .loading-state { text-align: center; padding: 60px 20px; color: #A7B5D6; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="brand-title">Great Big Game Show</div>
    <div class="brand-subtitle">★ &nbsp; Team Vault &nbsp; ★</div>
  </div>
</div>
<div class="gradient-rule"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',event)">All</button>
      <button class="tab" onclick="setFilter('incomplete',event)">In Progress</button>
      <button class="tab" onclick="setFilter('complete',event)">Complete</button>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Loading…</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-add" onclick="openAddDialog()">+ Add Task</button>
  </div>
</div>

<!-- STATS -->
<div id="stats-area"></div>

<!-- TABLE -->
<div id="main-content"><div class="loading-state">Loading vault…</div></div>

<!-- ADD TASK DIALOG -->
<div class="overlay" id="add-overlay">
  <div class="dialog add-dialog">
    <h3>Add New Task</h3>
    <p style="margin-bottom:20px;">Fill in the details below to add a task to the vault.</p>
    <div class="field-group">
      <label class="field-label">Task Name</label>
      <input class="field-input" id="input-task" type="text" placeholder="e.g. Host Training Guide" maxlength="120"
        onkeydown="if(event.key==='Enter')document.getElementById('ms-trigger').focus()">
      <div class="field-error" id="err-task"></div>
    </div>
    <div class="field-group">
      <label class="field-label">Owner(s)</label>
      <div class="ms-wrap" id="ms-wrap">
        <div class="ms-trigger" id="ms-trigger" tabindex="0" onclick="toggleDropdown()" onkeydown="if(event.key==='Enter'||event.key===' ')toggleDropdown()">
          <span class="ms-placeholder" id="ms-placeholder">Select owner(s)…</span>
        </div>
        <div class="ms-panel" id="ms-panel"></div>
      </div>
      <div class="field-error" id="err-who"></div>
    </div>
    <div class="dialog-btns" style="margin-top:6px;">
      <button class="btn btn-cancel" onclick="closeAddDialog()">Cancel</button>
      <button class="btn btn-confirm" onclick="submitAddTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- EDIT OWNER DIALOG -->
<div class="overlay" id="edit-owner-overlay">
  <div class="dialog add-dialog">
    <h3>Edit Owner(s)</h3>
    <p style="margin-bottom:20px;">Select one or more owners for this task.</p>
    <div class="field-group">
      <label class="field-label">Owner(s)</label>
      <div class="ms-wrap" id="ms-wrap-edit">
        <div class="ms-trigger" id="ms-trigger-edit" tabindex="0" onclick="toggleDropdownEdit()" onkeydown="if(event.key==='Enter'||event.key===' ')toggleDropdownEdit()">
          <span class="ms-placeholder" id="ms-placeholder-edit">Select owner(s)…</span>
        </div>
        <div class="ms-panel" id="ms-panel-edit"></div>
      </div>
      <div class="field-error" id="err-who-edit"></div>
    </div>
    <div class="dialog-btns" style="margin-top:6px;">
      <button class="btn btn-cancel" onclick="closeEditOwnerDialog()">Cancel</button>
      <button class="btn btn-confirm" onclick="submitEditOwner()">Save</button>
    </div>
  </div>
</div>


<script>
  const OWNERS = ['JD', 'Sam', 'Jansen', 'Reece', 'Colton', 'Luke', 'Zone Leaders', 'Teddy', 'Laura / Keith', 'Kevin'];

  let tasks = [];
  let activeFilter = 'all';
  let ownerSort = 'none';
  let pendingSave = null;

  /* ── SYNC STATUS ── */
  function setSyncStatus(state, label) {
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-label');
    dot.className = 'sync-dot' + (state ? ' ' + state : '');
    lbl.textContent = label;
  }

  /* ── API ── */
  async function fetchTasks() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error(res.status);
      return await res.json();
    } catch (e) {
      setSyncStatus('error', 'Sync error');
      return null;
    }
  }

  async function pushTasks(data) {
    setSyncStatus('saving', 'Saving…');
    try {
      const res = await fetch('/api/tasks', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(res.status);
      setSyncStatus('', 'Saved');
      setTimeout(() => setSyncStatus('', 'Live'), 2000);
    } catch {
      setSyncStatus('error', 'Save failed — retrying…');
      pendingSave = setTimeout(() => pushTasks(data), 5000);
    }
  }

  function save() {
    clearTimeout(pendingSave);
    pushTasks(tasks);
  }

  /* ── POLLING (10 s) ── */
  let lastPollHash = '';
  function hashTasks(t) { return JSON.stringify(t); }

  async function poll() {
    const fresh = await fetchTasks();
    if (!fresh) return;
    const h = hashTasks(fresh);
    if (h !== lastPollHash) {
      lastPollHash = h;
      tasks = fresh;
      renderStats();
      renderTableBody();
      setSyncStatus('', 'Live');
    }
  }

  /* ── TOGGLE ── */
  function toggle(idx, field) {
    tasks[idx][field] = !tasks[idx][field];
    save();
    renderStats();
    renderTableBody();
  }

  /* ── FILTER ── */
  function setFilter(f, e) {
    activeFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (e && e.target) e.target.classList.add('active');
    renderTableBody();
  }

  function isComplete(t) { return t.rc && t.fr && t.gb; }
  function rowVisible(t) {
    if (activeFilter === 'complete')   return isComplete(t);
    if (activeFilter === 'incomplete') return !isComplete(t);
    return true;
  }

  /* ── RENDER STATS ── */
  function pct(n, total) { return total ? Math.round(n / total * 100) : 0; }

  function renderStats() {
    const total = tasks.length;
    const rc   = tasks.filter(t => t.rc).length;
    const fr   = tasks.filter(t => t.fr).length;
    const gb   = tasks.filter(t => t.gb).length;
    const full = tasks.filter(isComplete).length;

    function card(num, label, done, hi) {
      const p = pct(done, total);
      return `<div class="stat-card${hi ? ' highlight' : ''}">
        <div class="stat-number">${num}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-pct">${p}%</div>
        <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${p}%"></div></div>
      </div>`;
    }

    document.getElementById('stats-area').innerHTML = `<div class="stats-bar">
      ${card(total, 'Total Tasks',      total, false)}
      ${card(rc,    'Resource Created', rc,    false)}
      ${card(fr,    'Zone Leader Approved 🤝', fr, false)}
      ${card(gb,    'Field Guide Ready ✨',   gb, false)}
      ${card(full,  'Fully Complete',   full,  true)}
    </div>`;
  }

  /* ── SORT ── */
  function cycleOwnerSort() {
    ownerSort = ownerSort === 'none' ? 'asc' : ownerSort === 'asc' ? 'desc' : 'none';
    const th   = document.getElementById('owner-th');
    const icon = document.getElementById('sort-icon');
    th.className = 'sort-th' + (ownerSort !== 'none' ? ' ' + ownerSort : '');
    icon.textContent = ownerSort === 'asc' ? '↑' : ownerSort === 'desc' ? '↓' : '⇅';
    renderTableBody();
  }

  function sortedIndexes() {
    const indexes = tasks.map((_, i) => i);
    if (ownerSort === 'none') return indexes;
    return indexes.sort((a, b) => {
      const cmp = tasks[a].who.localeCompare(tasks[b].who, undefined, { sensitivity: 'base' });
      return ownerSort === 'asc' ? cmp : -cmp;
    });
  }

  /* ── RENDER TABLE ── */
  function chkBtn(idx, field, val) {
    return `<button class="check-btn ${val ? 'done' : 'pending'}" onclick="toggle(${idx},'${field}')" title="${val ? 'Mark incomplete' : 'Mark complete'}">${val ? '✓' : ''}</button>`;
  }

  function renderTableBody() {
    const tbody = document.getElementById('task-tbody');
    if (!tbody) return;
    tbody.innerHTML = sortedIndexes().map(i => {
      const t = tasks[i];
      const done = isComplete(t);
      const hidden = rowVisible(t) ? '' : ' hidden-row';
      return `<tr class="task-row${hidden}">
        <td><div class="task-cell"><span class="star">★</span><span class="task-name${done ? ' all-done' : ''}">${t.task}</span></div></td>
        <td><div class="owner-cell"><span class="who-text">${t.who}</span><button class="edit-owner-btn" onclick="openEditOwnerDialog(${i})" title="Edit owner">✎</button></div></td>
        <td class="check-cell">${chkBtn(i, 'rc', t.rc)}</td>
        <td class="check-cell">${chkBtn(i, 'fr', t.fr)}</td>
        <td class="check-cell">${chkBtn(i, 'gb', t.gb)}</td>
      </tr>`;
    }).join('');
  }

  function renderTable() {
    document.getElementById('main-content').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:38%">Task</th>
              <th class="sort-th" id="owner-th" style="width:18%" onclick="cycleOwnerSort()"><div class="sort-inner">Task Owner ✋ <span class="sort-icon" id="sort-icon">⇅</span></div></th>
              <th class="center" style="width:15%">Resource Created</th>
              <th class="center" style="width:15%">Zone Leader Approved 🤝</th>
              <th class="center" style="width:14%">Field Guide Ready ✨</th>
            </tr>
          </thead>
          <tbody id="task-tbody"></tbody>
        </table>
      </div>`;
    renderTableBody();
  }

  /* ── ADD TASK MULTI-SELECT ── */
  let selectedOwners = [];

  function buildDropdown() {
    document.getElementById('ms-panel').innerHTML = OWNERS.map(o => `
      <div class="ms-option${selectedOwners.includes(o) ? ' selected' : ''}" onclick="toggleOwner('${o.replace(/'/g,"\\'")}')">
        <div class="ms-check">${selectedOwners.includes(o) ? '✓' : ''}</div>
        <span>${o}</span>
      </div>`).join('');
  }

  function updateTrigger() {
    const trigger = document.getElementById('ms-trigger');
    trigger.querySelectorAll('.ms-tag').forEach(t => t.remove());
    document.getElementById('ms-placeholder').style.display = selectedOwners.length ? 'none' : '';
    selectedOwners.forEach(o => {
      const tag = document.createElement('span');
      tag.className = 'ms-tag'; tag.textContent = o;
      trigger.appendChild(tag);
    });
  }

  function toggleOwner(name) {
    const idx = selectedOwners.indexOf(name);
    if (idx === -1) selectedOwners.push(name); else selectedOwners.splice(idx, 1);
    updateTrigger(); buildDropdown();
    document.getElementById('err-who').textContent = '';
  }

  function toggleDropdown() {
    const panel = document.getElementById('ms-panel');
    const trigger = document.getElementById('ms-trigger');
    if (panel.classList.contains('open')) { panel.classList.remove('open'); trigger.classList.remove('open'); }
    else { buildDropdown(); panel.classList.add('open'); trigger.classList.add('open'); }
  }

  function closeDropdown() {
    document.getElementById('ms-panel').classList.remove('open');
    document.getElementById('ms-trigger').classList.remove('open');
  }

  /* ── EDIT OWNER MULTI-SELECT ── */
  let editOwnerIdx = -1;
  let editSelectedOwners = [];

  function buildDropdownEdit() {
    document.getElementById('ms-panel-edit').innerHTML = OWNERS.map(o => `
      <div class="ms-option${editSelectedOwners.includes(o) ? ' selected' : ''}" onclick="toggleOwnerEdit('${o.replace(/'/g,"\\'")}')">
        <div class="ms-check">${editSelectedOwners.includes(o) ? '✓' : ''}</div>
        <span>${o}</span>
      </div>`).join('');
  }

  function updateTriggerEdit() {
    const trigger = document.getElementById('ms-trigger-edit');
    trigger.querySelectorAll('.ms-tag').forEach(t => t.remove());
    document.getElementById('ms-placeholder-edit').style.display = editSelectedOwners.length ? 'none' : '';
    editSelectedOwners.forEach(o => {
      const tag = document.createElement('span');
      tag.className = 'ms-tag'; tag.textContent = o;
      trigger.appendChild(tag);
    });
  }

  function toggleOwnerEdit(name) {
    const idx = editSelectedOwners.indexOf(name);
    if (idx === -1) editSelectedOwners.push(name); else editSelectedOwners.splice(idx, 1);
    updateTriggerEdit(); buildDropdownEdit();
    document.getElementById('err-who-edit').textContent = '';
  }

  function toggleDropdownEdit() {
    const panel = document.getElementById('ms-panel-edit');
    const trigger = document.getElementById('ms-trigger-edit');
    if (panel.classList.contains('open')) { panel.classList.remove('open'); trigger.classList.remove('open'); }
    else { buildDropdownEdit(); panel.classList.add('open'); trigger.classList.add('open'); }
  }

  function closeDropdownEdit() {
    document.getElementById('ms-panel-edit').classList.remove('open');
    document.getElementById('ms-trigger-edit').classList.remove('open');
  }

  /* ── CLICK OUTSIDE TO CLOSE DROPDOWNS ── */
  document.addEventListener('click', e => {
    if (!document.getElementById('ms-wrap')?.contains(e.target)) closeDropdown();
    if (!document.getElementById('ms-wrap-edit')?.contains(e.target)) closeDropdownEdit();
  });

  /* ── ADD TASK DIALOG ── */
  function openAddDialog() {
    document.getElementById('input-task').value = '';
    selectedOwners = []; updateTrigger(); closeDropdown();
    document.getElementById('err-task').textContent = '';
    document.getElementById('err-who').textContent = '';
    document.getElementById('add-overlay').classList.add('open');
    setTimeout(() => document.getElementById('input-task').focus(), 80);
  }

  function closeAddDialog() { closeDropdown(); document.getElementById('add-overlay').classList.remove('open'); }

  function submitAddTask() {
    const taskVal = document.getElementById('input-task').value.trim();
    let valid = true;
    if (!taskVal) { document.getElementById('err-task').textContent = 'Please enter a task name.'; valid = false; }
    else { document.getElementById('err-task').textContent = ''; }
    if (!selectedOwners.length) { document.getElementById('err-who').textContent = 'Please select at least one owner.'; valid = false; }
    else { document.getElementById('err-who').textContent = ''; }
    if (!valid) return;

    tasks.push({ task: taskVal, who: selectedOwners.join(' & '), rc: false, fr: false, gb: false });
    save(); renderStats(); renderTableBody(); closeAddDialog();

    const tbody = document.getElementById('task-tbody');
    if (tbody) {
      const newRow = tbody.lastElementChild;
      if (newRow) {
        newRow.style.background = 'rgba(151,40,209,0.25)';
        setTimeout(() => { newRow.style.background = ''; }, 1400);
        newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }
  }

  /* ── EDIT OWNER DIALOG ── */
  function openEditOwnerDialog(idx) {
    editOwnerIdx = idx;
    const currentWho = tasks[idx].who || '';
    editSelectedOwners = currentWho.split(/\s*&\s*|\s*,\s*/).map(s => s.trim()).filter(s => OWNERS.includes(s));
    updateTriggerEdit(); closeDropdownEdit();
    document.getElementById('err-who-edit').textContent = '';
    document.getElementById('edit-owner-overlay').classList.add('open');
  }

  function closeEditOwnerDialog() { closeDropdownEdit(); document.getElementById('edit-owner-overlay').classList.remove('open'); editOwnerIdx = -1; }

  function submitEditOwner() {
    if (!editSelectedOwners.length) { document.getElementById('err-who-edit').textContent = 'Please select at least one owner.'; return; }
    tasks[editOwnerIdx].who = editSelectedOwners.join(' & ');
    save(); renderTableBody(); closeEditOwnerDialog();
  }

  /* ── INIT ── */
  async function init() {
    setSyncStatus('saving', 'Loading…');
    const data = await fetchTasks();
    if (data) {
      tasks = data;
      lastPollHash = hashTasks(tasks);
      renderStats();
      renderTable();
      setSyncStatus('', 'Live');
    } else {
      document.getElementById('main-content').innerHTML = '<div class="loading-state">Could not connect — check your network.</div>';
    }
    setInterval(poll, 10000);
  }

  init();
</script>
</body>
</html>
